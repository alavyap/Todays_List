<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Settings</title>
</head>
<body class="modal-page">
    <div class="settings-modal standalone-modal" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
        <button class="modal-close-btn" id="settings-modal-close" aria-label="Close settings">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <h2 id="settings-modal-title">Settings</h2>
        <div class="settings-option">
            <p>Delete completed task after 2 minutes?</p>
            <label class="radio-option" for="delete-delay-no">
                <input type="radio" id="delete-delay-no" name="delete-delay" value="no">
                <span>No</span>
            </label>
            <label class="radio-option" for="delete-delay-yes">
                <input type="radio" id="delete-delay-yes" name="delete-delay" value="yes">
                <span>Yes</span>
            </label>
        </div>
    </div>
    <script src="./modal/modalScript.js"></script>
</body>
</html>
